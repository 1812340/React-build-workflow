name: React Build Workflow

on: 
  push:
    branches: [main]

jobs:
  build-react-workflow:
   runs-on: ubuntu-latest

   steps:
     - uses: actions/checkout@v6.0.2
     - name: Setup Node.js
       uses: actions/setup-node@v6.3.0
       with: 
        node-version: 22.x
     - name: install depedences
       uses: npm install
     - name: Build React app
       uses: npm run build
          
